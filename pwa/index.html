<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OpenCall">
<title>OpenCall</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--s1:#111;--s2:#181818;--s3:#1f1f1f;
  --b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.12);--b3:rgba(255,255,255,0.2);
  --tx:#f0ede8;--muted:rgba(240,237,232,0.42);--hint:rgba(240,237,232,0.2);
  --accent:#c8f55a;--accent-d:rgba(200,245,90,0.1);--accent-g:rgba(200,245,90,0.22);
  --red:#ff4d4d;--red-d:rgba(255,77,77,0.12);
  --green:#4dff91;--green-d:rgba(77,255,145,0.1);
  --orange:#ff9f43;
  --disp:'Syne',sans-serif;--mono:'DM Mono',monospace;
  --r:14px;--r-lg:22px;--r-pill:100px;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--mono);overflow:hidden;-webkit-font-smoothing:antialiased}
#app{height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}
#app::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0}

/* ── screens ── */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;z-index:1;transition:opacity .28s ease,transform .28s ease}
.screen.hidden{opacity:0;pointer-events:none;transform:translateY(14px)}

/* ── connection badge ── */
#conn-badge{position:fixed;top:env(safe-area-inset-top,16px);right:16px;margin-top:16px;z-index:50;display:flex;align-items:center;gap:6px;background:var(--s1);border:1px solid var(--b2);border-radius:var(--r-pill);padding:6px 14px;font-size:11px;color:var(--muted);letter-spacing:.06em}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .3s,box-shadow .3s}
.dot.on{background:var(--accent);box-shadow:0 0 8px var(--accent-g)}
.dot.err{background:var(--red)}

/* ── register screen ── */
#scr-register{gap:36px}
.logo{text-align:center}
.logo-icon{width:68px;height:68px;border-radius:22px;background:var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.logo-icon svg{width:34px;height:34px;color:#0a0a0a}
.logo h1{font-family:var(--disp);font-size:34px;font-weight:800;letter-spacing:-1px}
.logo p{font-size:12px;color:var(--muted);margin-top:6px;letter-spacing:.08em;text-transform:uppercase}
.form{width:100%;max-width:360px;display:flex;flex-direction:column;gap:14px}
.field-label{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
input[type=text],input[type=tel]{width:100%;background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);color:var(--tx);font-family:var(--mono);font-size:16px;padding:16px 20px;outline:none;transition:border-color .2s,box-shadow .2s;letter-spacing:.03em}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-d)}
input::placeholder{color:var(--hint)}
.btn{width:100%;padding:18px;border-radius:var(--r);border:none;font-family:var(--disp);font-size:15px;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:all .15s ease;text-transform:uppercase}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#0a0a0a}
.btn-primary:hover{background:#d4f96a}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;transform:none}
.note{font-size:11px;color:var(--hint);text-align:center;line-height:1.7}
.note a{color:var(--accent);text-decoration:none}

/* ── dialer screen ── */
#scr-dialer{justify-content:space-between;padding-top:max(env(safe-area-inset-top,0px),48px);padding-bottom:max(env(safe-area-inset-bottom,0px),36px);max-width:400px;margin:0 auto;width:100%}
.dialer-top{width:100%;display:flex;align-items:center;justify-content:space-between}
.my-num{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--b2);border-radius:var(--r-pill);padding:8px 16px;font-size:12px;color:var(--muted)}
.my-num strong{color:var(--tx)}
.btn-sm{background:var(--s1);color:var(--muted);border:1px solid var(--b2);border-radius:var(--r-pill);padding:9px 16px;font-family:var(--disp);font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.04em;text-transform:uppercase;transition:all .15s}
.btn-sm:hover{color:var(--tx);background:var(--s2)}
.dialer-mid{width:100%;display:flex;flex-direction:column;align-items:center;gap:28px}
.num-display input{background:transparent;border:none;border-bottom:2px solid var(--b2);border-radius:0;font-family:var(--disp);font-size:34px;font-weight:700;text-align:center;letter-spacing:5px;padding:12px 20px;width:100%;transition:border-color .2s}
.num-display input:focus{border-bottom-color:var(--accent);box-shadow:none}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:272px}
.key{aspect-ratio:1;border-radius:50%;background:var(--s1);border:1px solid var(--b1);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;user-select:none;gap:1px}
.key:hover{background:var(--s2);border-color:var(--b2)}
.key:active{transform:scale(.91);background:var(--accent-d)}
.kd{font-family:var(--disp);font-size:22px;font-weight:600;line-height:1}
.kl{font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
.dialer-btm{display:flex;align-items:center;justify-content:center;gap:24px}
.call-btn{width:72px;height:72px;border-radius:50%;border:none;background:var(--accent);color:#0a0a0a;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;box-shadow:0 0 0 0 var(--accent-g)}
.call-btn:hover{transform:scale(1.06);box-shadow:0 0 0 12px var(--accent-d)}
.call-btn:active{transform:scale(.94)}
.call-btn svg{width:28px;height:28px}
.icon-btn{width:50px;height:50px;border-radius:50%;border:1px solid var(--b2);background:var(--s1);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.icon-btn:hover{color:var(--tx);background:var(--s2)}
.icon-btn svg{width:18px;height:18px}

/* ── incoming screen ── */
#scr-incoming{background:var(--bg);z-index:10}
.pulse-wrap{position:relative;width:120px;height:120px;margin-bottom:30px}
.pulse-wrap::before,.pulse-wrap::after{content:'';position:absolute;inset:-22px;border-radius:50%;background:var(--accent-d);animation:pulse-ring 1.8s ease-out infinite}
.pulse-wrap::after{inset:-44px;animation-delay:.6s}
@keyframes pulse-ring{0%{opacity:1;transform:scale(.82)}100%{opacity:0;transform:scale(1.18)}}
.avatar{width:120px;height:120px;border-radius:50%;background:var(--s2);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-size:42px;font-weight:800;color:var(--accent);position:relative;z-index:1}
.inc-label{font-size:11px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px}
.inc-name{font-family:var(--disp);font-size:28px;font-weight:700;text-align:center}
.inc-num{font-size:14px;color:var(--muted);margin-top:4px;letter-spacing:.08em}
.inc-actions{display:flex;gap:44px;margin-top:44px}
.act{display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;background:none;border:none}
.act-circle{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s;border:none;cursor:pointer}
.act-circle:active{transform:scale(.91)}
.act-circle.ans{background:var(--green-d);border:1px solid rgba(77,255,145,.28)}
.act-circle.ans:hover{background:rgba(77,255,145,.18)}
.act-circle.dec{background:var(--red-d);border:1px solid rgba(255,77,77,.28)}
.act-circle.dec:hover{background:rgba(255,77,77,.2)}
.act-circle svg{width:28px;height:28px}
.act-circle.ans svg{color:var(--green)}
.act-circle.dec svg{color:var(--red)}
.act-label{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}

/* ── active call screen ── */
#scr-call{background:var(--bg);z-index:10}
.call-status-lbl{font-size:11px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px}
.call-timer{font-family:var(--disp);font-size:52px;font-weight:300;letter-spacing:4px;color:var(--accent);font-variant-numeric:tabular-nums}
.call-with{font-size:13px;color:var(--muted);margin-top:6px;letter-spacing:.1em}
.call-mode{font-size:10px;color:var(--hint);margin-top:4px;letter-spacing:.1em;text-transform:uppercase}
.call-ctrls{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:300px;margin:40px 0}
.ctrl{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;background:none;border:none;color:var(--tx);padding:0}
.ctrl-ico{width:56px;height:56px;border-radius:50%;background:var(--s1);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;transition:all .15s}
.ctrl:active .ctrl-ico{transform:scale(.91)}
.ctrl.active .ctrl-ico{background:var(--accent-d);border-color:var(--accent)}
.ctrl-ico svg{width:22px;height:22px;color:var(--muted)}
.ctrl.active .ctrl-ico svg{color:var(--accent)}
.ctrl-lbl{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.end-btn{width:72px;height:72px;border-radius:50%;border:none;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;box-shadow:0 0 0 0 rgba(255,77,77,.3)}
.end-btn:hover{box-shadow:0 0 0 12px rgba(255,77,77,.12)}
.end-btn:active{transform:scale(.94)}
.end-btn svg{width:28px;height:28px}

/* ── ringing state on dialer ── */
@keyframes ring-shake{0%,100%{transform:rotate(0)}20%{transform:rotate(-9deg)}40%{transform:rotate(9deg)}60%{transform:rotate(-6deg)}80%{transform:rotate(6deg)}}
.ringing .logo-icon{animation:ring-shake .6s ease-in-out infinite}

/* ── toast ── */
#toast{position:fixed;bottom:max(env(safe-area-inset-bottom,24px),24px);left:50%;transform:translateX(-50%) translateY(18px);background:var(--s2);border:1px solid var(--b2);border-radius:var(--r-pill);padding:12px 24px;font-size:12px;color:var(--tx);letter-spacing:.06em;white-space:nowrap;z-index:200;opacity:0;transition:all .28s ease;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── relay badge ── */
.relay-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,159,67,.12);border:1px solid rgba(255,159,67,.3);border-radius:var(--r-pill);padding:4px 12px;font-size:10px;color:var(--orange);letter-spacing:.08em;text-transform:uppercase;margin-top:8px}
</style>
</head>
<body>
<div id="app">

  <!-- connection badge -->
  <div id="conn-badge">
    <span class="dot" id="conn-dot"></span>
    <span id="conn-lbl">Offline</span>
  </div>

  <!-- ══════════════ REGISTER ══════════════ -->
  <div class="screen" id="scr-register">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
        </svg>
      </div>
      <h1>OpenCall</h1>
      <p>Internet calls · No carrier · No cost</p>
    </div>

    <div class="form">
      <div>
        <div class="field-label">Your name</div>
        <input type="text" id="inp-name" placeholder="e.g. Alex" maxlength="30" autocomplete="name"/>
      </div>
      <div>
        <div class="field-label">Your number (US / Canada)</div>
        <input type="tel" id="inp-number" placeholder="+1 416 555 0100" autocomplete="tel"/>
      </div>
      <div>
        <div class="field-label">Signal server</div>
        <input type="text" id="inp-server" placeholder="wss://opencall-server-production.up.railway.app" value="wss://opencall-server.onrender.com"/>
      </div>
      <div>
        <div class="field-label">Your OCP address</div>
        <input type="text" id="inp-ocp-address" readonly placeholder="generating..." style="background:var(--s2);color:var(--muted);cursor:default;font-size:13px;letter-spacing:.02em"/>
      </div>
      <div style="display:flex;gap:8px;margin-top:-6px">
        <button
          onclick="exportIdentity()"
          style="flex:1;padding:10px;background:var(--s2);color:var(--muted);
                 border:1px solid var(--b2);border-radius:var(--r);
                 font-family:var(--mono);font-size:11px;cursor:pointer;
                 letter-spacing:.06em"
          type="button">
          EXPORT KEY
        </button>
        <button
          onclick="importIdentity()"
          style="flex:1;padding:10px;background:var(--s2);color:var(--muted);
                 border:1px solid var(--b2);border-radius:var(--r);
                 font-family:var(--mono);font-size:11px;cursor:pointer;
                 letter-spacing:.06em"
          type="button">
          IMPORT KEY
        </button>
      </div>
      <button class="btn btn-primary" id="btn-register" onclick="doRegister()">
        Claim my number →
      </button>
      <p class="note">
        Run the server locally or deploy free to <a href="https://railway.app" target="_blank">Railway</a>.<br>
        Your number. Your server. Zero cost.
      </p>
    </div>
  </div>

  <!-- ══════════════ DIALER ══════════════ -->
  <div class="screen hidden" id="scr-dialer">
    <div class="dialer-top">
      <div class="my-num">
        <span class="dot on"></span>
        <div style="display:flex;flex-direction:column;gap:2px">
          <strong id="lbl-mynum">+1...</strong>
          <span id="lbl-ocpaddr" style="font-size:10px;color:var(--hint);letter-spacing:.04em"></span>
        </div>
      </div>
      <button class="btn-sm" onclick="doLogout()">Leave</button>
    </div>

    <div class="dialer-mid">
      <div class="num-display" style="width:100%">
        <input type="tel" id="inp-dial" placeholder="+1 ··· ··· ····" readonly/>
      </div>
      <div class="keypad" id="keypad"></div>
    </div>

    <div class="dialer-btm">
      <div style="width:50px"></div>
      <button class="call-btn" id="btn-call" onclick="doCall()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
        </svg>
      </button>
      <button class="icon-btn" onclick="doDelete()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/>
          <line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ══════════════ INCOMING ══════════════ -->
  <div class="screen hidden" id="scr-incoming">
    <div class="pulse-wrap">
      <div class="avatar" id="inc-avatar">?</div>
    </div>
    <div class="inc-label">Incoming call</div>
    <div class="inc-name" id="inc-name">Unknown</div>
    <div class="inc-num"  id="inc-num">+1...</div>

    <div class="inc-actions">
      <div>
        <button class="act-circle dec" onclick="doDecline()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.68 13.31a16 16 0 003.41 2.6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.42 19.42 0 01-3.33-2.67m-2.67-3.34a19.79 19.79 0 01-3.07-8.63A2 2 0 014 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91"/>
            <line x1="23" y1="1" x2="1" y2="23"/>
          </svg>
        </button>
        <div class="act-label" style="margin-top:10px;text-align:center">Decline</div>
      </div>
      <div>
        <button class="act-circle ans" onclick="doAnswer()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
          </svg>
        </button>
        <div class="act-label" style="margin-top:10px;text-align:center">Answer</div>
      </div>
    </div>
  </div>

  <!-- ══════════════ ACTIVE CALL ══════════════ -->
  <div class="screen hidden" id="scr-call">
    <div class="call-status-lbl" id="call-status-lbl">Connecting...</div>
    <div class="call-timer" id="call-timer">00:00</div>
    <div class="call-with"  id="call-with">+1...</div>
    <div class="call-mode"  id="call-mode"></div>

    <div class="call-ctrls">
      <button class="ctrl" id="ctrl-mute" onclick="toggleMute()">
        <div class="ctrl-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
            <path d="M19 10v2a7 7 0 01-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </div>
        <span class="ctrl-lbl">Mute</span>
      </button>

      <button class="ctrl" id="ctrl-spk" onclick="toggleSpeaker()">
        <div class="ctrl-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>
          </svg>
        </div>
        <span class="ctrl-lbl">Speaker</span>
      </button>

      <button class="ctrl" id="ctrl-kp" onclick="toggleKeypad()">
        <div class="ctrl-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="4" height="4" rx="1"/><rect x="10" y="3" width="4" height="4" rx="1"/><rect x="17" y="3" width="4" height="4" rx="1"/>
            <rect x="3" y="10" width="4" height="4" rx="1"/><rect x="10" y="10" width="4" height="4" rx="1"/><rect x="17" y="10" width="4" height="4" rx="1"/>
            <rect x="3" y="17" width="4" height="4" rx="1"/><rect x="10" y="17" width="4" height="4" rx="1"/><rect x="17" y="17" width="4" height="4" rx="1"/>
          </svg>
        </div>
        <span class="ctrl-lbl">Keypad</span>
      </button>
    </div>

    <button class="end-btn" onclick="doHangup()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

<script>
// ── OCP Identity — Web Crypto API (no dependencies) ──────
const OCP_KEY_STORAGE = 'ocp_identity_v1';

async function generateIdentity() {
  // Generate Ed25519 key pair using Web Crypto
  const keyPair = await crypto.subtle.generateKey(
    { name: 'Ed25519' },
    true,
    ['sign', 'verify']
  );

  // Export keys
  const publicKeyRaw = await crypto.subtle.exportKey('raw', keyPair.publicKey);
  const privateKeyJwk = await crypto.subtle.exportKey('jwk', keyPair.privateKey);
  const publicKeyJwk = await crypto.subtle.exportKey('jwk', keyPair.publicKey);

  // Compute fingerprint using SHA-256
  const fingerprint = await crypto.subtle.digest('SHA-256', publicKeyRaw);
  const fingerprintHex = Array.from(new Uint8Array(fingerprint))
    .map(b => b.toString(16).padStart(2, '0')).join('');

  const ocpAddress = 'ocp:' + fingerprintHex;

  return {
    privateKeyJwk,
    publicKeyJwk,
    publicKeyRaw: btoa(String.fromCharCode(...new Uint8Array(publicKeyRaw))),
    fingerprint: fingerprintHex,
    ocp_address: ocpAddress,
    created: Date.now()
  };
}

async function saveIdentity(identity) {
  localStorage.setItem(OCP_KEY_STORAGE, JSON.stringify(identity));
  console.log('[OCP] Identity saved:', identity.ocp_address);
}

async function loadIdentity() {
  const stored = localStorage.getItem(OCP_KEY_STORAGE);
  if (!stored) return null;
  return JSON.parse(stored);
}

async function getOrCreateIdentity() {
  let identity = await loadIdentity();
  if (!identity) {
    console.log('[OCP] Generating new Ed25519 key pair...');
    identity = await generateIdentity();
    await saveIdentity(identity);
  }
  console.log('[OCP] Identity loaded:', identity.ocp_address);
  return identity;
}

async function exportIdentity() {
  const identity = await loadIdentity();
  if (!identity) return toast('No identity to export');

  // Encrypt the backup with a user passphrase
  const passphrase = prompt('Enter a passphrase to protect your backup:');
  if (!passphrase) return;

  const salt = crypto.getRandomValues(new Uint8Array(16));
  const keyMaterial = await crypto.subtle.importKey(
    'raw',
    new TextEncoder().encode(passphrase),
    { name: 'PBKDF2' },
    false,
    ['deriveKey']
  );
  const encryptionKey = await crypto.subtle.deriveKey(
    {
      name: 'PBKDF2',
      salt,
      iterations: 100000,
      hash: 'SHA-256'
    },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt']
  );
  const nonce = crypto.getRandomValues(new Uint8Array(12));
  const encrypted = await crypto.subtle.encrypt(
    { name: 'AES-GCM', iv: nonce },
    encryptionKey,
    new TextEncoder().encode(JSON.stringify(identity))
  );

  const backup = {
    version: 1,
    salt:    btoa(String.fromCharCode(...salt)),
    nonce:   btoa(String.fromCharCode(...new Uint8Array(nonce))),
    data:    btoa(String.fromCharCode(...new Uint8Array(encrypted)))
  };

  // Download as file
  const blob = new Blob([JSON.stringify(backup)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'ocp-identity-backup.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Identity exported — keep this file safe');
}

async function importIdentity() {
  const input = document.createElement('input');
  input.type  = 'file';
  input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const text = await file.text();
    let backup;
    try { backup = JSON.parse(text); }
    catch { return toast('Invalid backup file'); }

    const passphrase = prompt('Enter your backup passphrase:');
    if (!passphrase) return;

    try {
      const salt  = Uint8Array.from(atob(backup.salt),  c => c.charCodeAt(0));
      const nonce = Uint8Array.from(atob(backup.nonce), c => c.charCodeAt(0));
      const data  = Uint8Array.from(atob(backup.data),  c => c.charCodeAt(0));

      const keyMaterial = await crypto.subtle.importKey(
        'raw',
        new TextEncoder().encode(passphrase),
        { name: 'PBKDF2' },
        false,
        ['deriveKey']
      );
      const encryptionKey = await crypto.subtle.deriveKey(
        {
          name: 'PBKDF2',
          salt,
          iterations: 100000,
          hash: 'SHA-256'
        },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );
      const decrypted = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: nonce },
        encryptionKey,
        data
      );
      const identity = JSON.parse(new TextDecoder().decode(decrypted));
      await saveIdentity(identity);
      myIdentity = identity;
      document.getElementById('inp-ocp-address').value = identity.ocp_address;
      toast('Identity imported successfully');
    } catch(e) {
      toast('Wrong passphrase or corrupted file');
    }
  };
  input.click();
}

async function signMessage(identity, messageObj) {
  const privateKey = await crypto.subtle.importKey(
    'jwk',
    identity.privateKeyJwk,
    { name: 'Ed25519' },
    false,
    ['sign']
  );
  const messageBytes = new TextEncoder().encode(JSON.stringify(messageObj));
  const signature = await crypto.subtle.sign('Ed25519', privateKey, messageBytes);
  return btoa(String.fromCharCode(...new Uint8Array(signature)));
}

async function encryptMessage(identity, recipientPublicKeyB64, bodyObj) {
  // Use ECDH with P-256 for encryption (Web Crypto supported)
  const ephemeralKey = await crypto.subtle.generateKey(
    { name: 'ECDH', namedCurve: 'P-256' },
    true,
    ['deriveKey']
  );
  const ephemeralPublicRaw = await crypto.subtle.exportKey(
    'raw', ephemeralKey.publicKey
  );

  // Derive AES key
  const aesKey = await crypto.subtle.deriveKey(
    { name: 'ECDH', public: ephemeralKey.publicKey },
    ephemeralKey.privateKey,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt']
  );

  const nonce = crypto.getRandomValues(new Uint8Array(12));
  const plaintext = new TextEncoder().encode(JSON.stringify(bodyObj));
  const ciphertext = await crypto.subtle.encrypt(
    { name: 'AES-GCM', iv: nonce },
    aesKey,
    plaintext
  );

  return {
    ephemeral: btoa(String.fromCharCode(...new Uint8Array(ephemeralPublicRaw))),
    nonce: btoa(String.fromCharCode(...new Uint8Array(nonce))),
    body: btoa(String.fromCharCode(...new Uint8Array(ciphertext)))
  };
}

// ── Double Ratchet Session Management ─────────────────────
const ratchetSessions = new Map(); // callWith → session state

// ── OCP DHT Client ────────────────────────────────────────
const DHT_BOOTSTRAP = [
  'wss://ocp-bootstrap-1.onrender.com/ws',
  'wss://ocp-bootstrap-2.onrender.com/ws',
  'wss://ocp-bootstrap-3.onrender.com/ws'
];
const dhtPeers = new Map();
let dhtReady = false;
const dhtCallbacks = new Map();

async function initDHT() {
  console.log('[DHT] Connecting to bootstrap nodes...');
  let connected = 0;
  for (const url of DHT_BOOTSTRAP) {
    try {
      await new Promise((resolve) => {
        const peer = new WebSocket(url);
        const timeout = setTimeout(() => { peer.close(); resolve(); }, 5000);
        peer.onopen = () => {
          clearTimeout(timeout);
          dhtPeers.set(url, peer);
          connected++;
          console.log('[DHT] Connected to', url);
          resolve();
        };
        peer.onmessage = (e) => {
          try {
            const msg = JSON.parse(e.data);
            if (msg.type === 'FOUND_VALUE') {
              const cb = dhtCallbacks.get(msg.key);
              if (cb) { cb(msg.value); dhtCallbacks.delete(msg.key); }
            }
          } catch {}
        };
        peer.onerror = () => { clearTimeout(timeout); resolve(); };
        peer.onclose = () => { dhtPeers.delete(url); };
      });
    } catch(e) {}
  }
  dhtReady = connected > 0;
  console.log('[DHT]', connected, 'of 3 bootstrap nodes connected');
  if (dhtReady) {
    setInterval(async () => {
      if (myIdentity) await dhtAnnounce(myIdentity.ocp_address, 'online');
      if (myNumber) await dhtAnnouncePhone(myNumber, myIdentity?.ocp_address);
    }, 25 * 60 * 1000);
  }
}

async function dhtSend(msg) {
  const payload = JSON.stringify(msg);
  let sent = 0;
  for (const peer of dhtPeers.values()) {
    if (peer.readyState === 1) { peer.send(payload); sent++; }
  }
  return sent > 0;
}

async function dhtAnnounce(key, value) {
  if (!dhtReady) return false;
  const ok = await dhtSend({ type:'STORE', key, value, ttl:3600 });
  if (ok) console.log('[DHT] Stored:', key.slice(0,20) + '...');
  return ok;
}

async function dhtLookup(key) {
  if (!dhtReady) return null;
  return new Promise((resolve) => {
    const timeout = setTimeout(() => {
      dhtCallbacks.delete(key);
      resolve(null);
    }, 4000);
    dhtCallbacks.set(key, (value) => {
      clearTimeout(timeout);
      resolve(value);
    });
    dhtSend({ type:'FIND_VALUE', key });
  });
}

async function dhtAnnouncePhone(phone, ocpAddress) {
  if (!phone || !ocpAddress) return;
  return dhtAnnounce('phone:' + phone, ocpAddress);
}

async function dhtLookupPhone(phone) {
  return dhtLookup('phone:' + phone);
}

async function enumLookup(phoneNumber) {
  try {
    // Convert +14165550100 to 0.0.1.0.5.5.5.6.1.4.1.e164.arpa
    const digits = phoneNumber.replace(/\D/g, '');
    const reversed = digits.split('').reverse().join('.');
    const enumDomain = reversed + '.e164.arpa';

    // Query DNS over HTTPS (DoH) — Cloudflare
    const response = await fetch(
      'https://cloudflare-dns.com/dns-query?name=' +
      enumDomain + '&type=NAPTR',
      { headers: { 'Accept': 'application/dns-json' } }
    );
    const data = await response.json();

    if (data.Answer && data.Answer.length > 0) {
      for (const record of data.Answer) {
        if (record.data && record.data.includes('sip:')) {
          const match = record.data.match(/sip:[^\s"]+/);
          if (match) {
            console.log('[ENUM] Found SIP address:', match[0]);
            return match[0];
          }
        }
      }
    }
    return null;
  } catch(e) {
    console.log('[ENUM] Lookup failed:', e.message);
    return null;
  }
}

async function initRatchetSession(withNumber) {
  const rootKeyMaterial = crypto.getRandomValues(new Uint8Array(32));
  const rootKey = await crypto.subtle.importKey(
    'raw', rootKeyMaterial,
    { name: 'HKDF' }, false, ['deriveKey']
  );
  const sendKey = await crypto.subtle.deriveKey(
    {
      name: 'HKDF',
      hash: 'SHA-256',
      salt: crypto.getRandomValues(new Uint8Array(32)),
      info: new TextEncoder().encode('OCP-send-v1')
    },
    rootKey,
    { name: 'AES-GCM', length: 256 },
    true,
    ['encrypt']
  );
  const recvKey = await crypto.subtle.deriveKey(
    {
      name: 'HKDF',
      hash: 'SHA-256',
      salt: crypto.getRandomValues(new Uint8Array(32)),
      info: new TextEncoder().encode('OCP-recv-v1')
    },
    rootKey,
    { name: 'AES-GCM', length: 256 },
    true,
    ['decrypt']
  );
  ratchetSessions.set(withNumber, {
    sendKey,
    recvKey,
    sendCount: 0,
    recvCount: 0,
    createdAt: Date.now()
  });
  console.log('[OCP] Ratchet session initialised for', withNumber);
}

async function ratchetEncrypt(withNumber, plaintext) {
  let session = ratchetSessions.get(withNumber);
  if (!session) {
    await initRatchetSession(withNumber);
    session = ratchetSessions.get(withNumber);
  }
  const nonce = crypto.getRandomValues(new Uint8Array(12));
  const encrypted = await crypto.subtle.encrypt(
    { name: 'AES-GCM', iv: nonce },
    session.sendKey,
    new TextEncoder().encode(JSON.stringify(plaintext))
  );
  session.sendCount++;
  return {
    nonce: btoa(String.fromCharCode(...new Uint8Array(nonce))),
    body:  btoa(String.fromCharCode(...new Uint8Array(encrypted))),
    count: session.sendCount
  };
}

async function ratchetDecrypt(withNumber, encrypted) {
  const session = ratchetSessions.get(withNumber);
  if (!session) return null;
  try {
    const nonce = Uint8Array.from(atob(encrypted.nonce), c => c.charCodeAt(0));
    const body  = Uint8Array.from(atob(encrypted.body),  c => c.charCodeAt(0));
    const decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: nonce },
      session.recvKey,
      body
    );
    session.recvCount++;
    return JSON.parse(new TextDecoder().decode(decrypted));
  } catch(e) {
    console.error('[OCP] Ratchet decrypt failed:', e.message);
    return null;
  }
}

function clearRatchetSession(withNumber) {
  ratchetSessions.delete(withNumber);
  console.log('[OCP] Ratchet session cleared for', withNumber);
}

// Load identity on startup
let myIdentity = null;
getOrCreateIdentity().then(async id => {
  myIdentity = id;
  const field = document.getElementById('inp-ocp-address');
  if (field) field.value = id.ocp_address;
  console.log('[OCP] Ready ✓ Identity:', id.ocp_address);
  initDHT().then(() => {
    if (dhtReady && myIdentity) {
      dhtAnnounce(myIdentity.ocp_address, 'online');
      console.log('[DHT] Identity announced');
    }
  });
}).catch(e => console.error('[OCP] Identity init failed:', e));

// ══════════════════════════════════════════════════════════════
//  OpenCall Client v1.0
//  WebSocket signaling + WebRTC audio
//  Zero external dependencies

// ── state ──────────────────────────────────────────────────
let ws            = null;
let pc            = null;       // RTCPeerConnection
let localStream   = null;
let myNumber      = null;
let myName        = null;
let callId        = null;
let callWith      = null;
let callMode      = null;       // "direct" | "relay"
let pendingCall   = null;
let isMuted       = false;
let timerInterval = null;
let timerSecs     = 0;
let audioCtx      = null;
let ringInterval  = null;
let ringbackCtx   = null;
let ringbackInt   = null;

// ── WebRTC config — Google free STUN ──────────────────────
const RTC_CFG = {

// ── screen router ──────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById('scr-'+id).classList.remove('hidden');
}

// ── toast ──────────────────────────────────────────────────
let toastTimer;
function toast(msg, dur=3200) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), dur);
}

// ── connection status ──────────────────────────────────────
function setConn(state) {
  const dot = document.getElementById('conn-dot');
  const lbl = document.getElementById('conn-lbl');
  dot.className = 'dot ' + (state === 'on' ? 'on' : state === 'err' ? 'err' : '');
  lbl.textContent = state === 'on' ? 'Connected' : state === 'err' ? 'Error' : 'Offline';
}

// ── register ───────────────────────────────────────────────
async function doRegister() {
  // Load or generate OCP cryptographic identity
  if (!myIdentity) {
    myIdentity = await getOrCreateIdentity();
    console.log('[OCP] Using identity:', myIdentity.ocp_address);
  }
  document.getElementById('inp-ocp-address').value = myIdentity.ocp_address;

  const name   = document.getElementById('inp-name').value.trim();
  const number = document.getElementById('inp-number').value.trim();
  const server = document.getElementById('inp-server').value.trim();
  if (!name)   return toast('Enter your name');
  if (!number) return toast('Enter your number');
  if (!server) return toast('Enter server URL');

  myName   = name;
  myNumber = number;

  const btn = document.getElementById('btn-register');
  btn.disabled = true;
  btn.textContent = 'Connecting...';

  try {
    ws = new WebSocket(server);
  } catch(e) {
    toast('Invalid server URL');
    resetBtn(); return;
  }

  ws.onopen = async () => {
    setConn('on');
    await wsSend({
      type:       'register',
      number,
      name,
      public_key: myIdentity ? JSON.stringify(myIdentity.publicKeyJwk) : null
    });
  };
  ws.onmessage = e => {
    try { onMessage(JSON.parse(e.data)); } catch {}
  };
  ws.onclose = () => {
    setConn('off');
    toast('Disconnected');
    if (callId) endCall();
    resetBtn();
    show('register');
  };
  ws.onerror = () => {
    toast('Cannot reach server — is it running?');
    resetBtn();
  };
}

function resetBtn() {
  const btn = document.getElementById('btn-register');
  btn.disabled = false;
  btn.textContent = 'Claim my number →';
}

function doLogout() {
  if (ws) ws.close();
  show('register');
}

// ── message handler ────────────────────────────────────────
async function onMessage(msg) {
  console.log('[←]', msg.type, msg);
  switch(msg.type) {

    case 'registered':
      document.getElementById('lbl-mynum').textContent = msg.number;
      if (myIdentity) {
        document.getElementById('lbl-ocpaddr').textContent = myIdentity.ocp_address.slice(0, 16) + '…';
      }
      show('dialer');
      toast('Registered as ' + msg.number);
      if (myIdentity && dhtReady) {
        dhtAnnounce(myIdentity.ocp_address, 'online');
        if (myNumber) dhtAnnouncePhone(myNumber, myIdentity.ocp_address);
        console.log('[DHT] Announced identity and phone');
      }
      break;

    case 'ringing':
      callId   = msg.callId;
      callWith = msg.to;
      callMode = msg.mode;
      document.getElementById('call-status-lbl').textContent = 'Ringing...';
      document.getElementById('call-timer').textContent = '00:00';
      document.getElementById('call-with').textContent  = msg.to;
      document.getElementById('call-mode').textContent  = msg.mode === 'relay' ? 'via relay' : 'direct';
      show('call');
      startRingback();
      break;

    case 'answered':
      stopRingback();
      document.getElementById('call-status-lbl').textContent = 'Connected';
      startTimer();
      await initWebRTC(true);
      break;

    case 'call_connected':
      document.getElementById('call-status-lbl').textContent = 'Connected';
      document.getElementById('call-with').textContent  = callWith;
      document.getElementById('call-mode').textContent  = callMode === 'relay' ? 'via relay' : 'direct';
      show('call');
      startTimer();
      break;

    case 'incoming_call':
      pendingCall = msg;
      callWith    = msg.from;
      callMode    = 'direct';
      document.getElementById('inc-name').textContent   = msg.fromName || 'Unknown';
      document.getElementById('inc-num').textContent    = msg.from;
      document.getElementById('inc-avatar').textContent = (msg.fromName || '?')[0].toUpperCase();
      show('incoming');
      startRingtone();
      break;

    case 'rejected':
      stopRingback();
      toast('Call declined');
      endCall();
      break;

    case 'hangup':
      toast('Call ended');
      endCall();
      break;

    case 'unavailable':
      toast(msg.number + ' is not on OpenCall yet');
      endCall();
      break;

    case 'no_relay':
      toast('No relay available for this number');
      endCall();
      break;

    case 'sdp_offer':
      await handleOffer(msg.sdp, msg.from);
      break;

    case 'sdp_answer':
      if (pc) await pc.setRemoteDescription({ type:'answer', sdp:msg.sdp });
      break;

    case 'ice':
      if (pc && msg.candidate) {
        try { await pc.addIceCandidate(msg.candidate); } catch {}
      }
      break;

    case 'error':
      toast('Error: ' + msg.reason);
      break;
  }
}

// ── dialer actions ─────────────────────────────────────────
function pressKey(d) {
  const inp = document.getElementById('inp-dial');
  if (inp.value.length < 15) inp.value += d;
}
function doDelete() {
  const inp = document.getElementById('inp-dial');
  inp.value = inp.value.slice(0,-1);
}
async function doCall() {
  const to = document.getElementById('inp-dial').value.trim();
  if (!to || to.length < 7) return toast('Enter a valid number');
  if (!ws || ws.readyState !== 1) return toast('Not connected to server');

  // Step 1: Check if number is registered in OCP via DHT
  if (dhtReady && to.startsWith('+')) {
    console.log('[DHT] Looking up', to, 'in DHT...');
    const ocpAddr = await dhtLookupPhone(to);
    if (ocpAddr) {
      console.log('[DHT] Found OCP address for', to, ':', ocpAddr);
      toast('Routing via OCP network...');
    } else {
      console.log('[DHT] Not in DHT — routing via signal server');
    }
  }

  // Step 2: Initialise ratchet session
  await initRatchetSession(to);

  // Step 3: Route call via signal server (DHT routing in Phase 3 end)
  await wsSend({ type:'call', to });
}

// ── answer / decline ───────────────────────────────────────
async function doAnswer() {
  stopRingtone();
  callId   = pendingCall.callId;
  callWith = pendingCall.from;
  callMode = 'direct';
  await initRatchetSession(callWith);
  await wsSend({ type:'answer', callId:pendingCall.callId, from:pendingCall.from });
  initWebRTC(false);
}
async function doDecline() {
  stopRingtone();
  await wsSend({ type:'reject', callId:pendingCall.callId, from:pendingCall.from });
  pendingCall = null;
  show('dialer');
}

// ── hangup ─────────────────────────────────────────────────
async function doHangup() {
  await wsSend({ type:'hangup', callId, with:callWith });
  endCall();
}
function endCall() {
  stopTimer();
  stopRingtone();
  stopRingback();
  if (pc) { pc.close(); pc = null; }
  if (localStream) { localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
  if (callWith) clearRatchetSession(callWith);
  callId = callWith = callMode = pendingCall = null;
  document.getElementById('inp-dial').value = '';
  show('dialer');
}

// ── WebRTC ─────────────────────────────────────────────────
async function initWebRTC(isCaller) {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio:true, video:false });
  } catch {
    toast('Microphone access denied');
    doHangup(); return;
  }

  pc = new RTCPeerConnection(RTC_CFG);
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  pc.ontrack = e => {
    const audio = document.getElementById('remote-audio');
    audio.srcObject = e.streams[0];
    audio.play().catch(()=>{});
  };

  pc.onicecandidate = async e => {
    if (e.candidate) await wsSend({ type:'ice', to:callWith, candidate:e.candidate });
  };

  pc.oniceconnectionstatechange = () => {
    if (pc?.iceConnectionState === 'failed' || pc?.iceConnectionState === 'disconnected') {
      toast('Connection lost');
      endCall();
    }
  };

  if (isCaller) {
    const offer = await pc.createOffer({ offerToReceiveAudio:true });
    await pc.setLocalDescription(offer);
    await wsSend({ type:'sdp_offer', to:callWith, sdp:offer.sdp });
  }
}

async function handleOffer(sdp, from) {
  if (!pc) await initWebRTC(false);
  await pc.setRemoteDescription({ type:'offer', sdp });
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await wsSend({ type:'sdp_answer', to:from, sdp:answer.sdp });
}

// ── call timer ─────────────────────────────────────────────
function startTimer() {
  timerSecs = 0;
  timerInterval = setInterval(() => {
    timerSecs++;
    const m = String(Math.floor(timerSecs/60)).padStart(2,'0');
    const s = String(timerSecs%60).padStart(2,'0');
    document.getElementById('call-timer').textContent = `${m}:${s}`;
  }, 1000);
}
function stopTimer() { clearInterval(timerInterval); timerInterval=null; timerSecs=0; }

// ── ringtone — Web Audio, no files needed ──────────────────
function startRingtone() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  let i=0;
  function ring() {
    if (!audioCtx) return;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = i%2===0?480:440;
    g.gain.setValueAtTime(.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime+.4);
    o.start(audioCtx.currentTime); o.stop(audioCtx.currentTime+.4);
    i++;
  }
  ring();
  ringInterval = setInterval(ring, 820);
}
function stopRingtone() {
  clearInterval(ringInterval);
  if (audioCtx) { audioCtx.close(); audioCtx=null; }
}

function startRingback() {
  if (ringbackCtx) return;
  ringbackCtx = new (window.AudioContext||window.webkitAudioContext)();
  function beep() {
    if (!ringbackCtx) return;
    const o=ringbackCtx.createOscillator(), g=ringbackCtx.createGain();
    o.connect(g); g.connect(ringbackCtx.destination);
    o.frequency.value=440;
    g.gain.setValueAtTime(.12, ringbackCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, ringbackCtx.currentTime+1);
    o.start(ringbackCtx.currentTime); o.stop(ringbackCtx.currentTime+1);
  }
  beep();
  ringbackInt = setInterval(beep, 3200);
}
function stopRingback() {
  clearInterval(ringbackInt);
  if (ringbackCtx) { ringbackCtx.close(); ringbackCtx=null; }
}

// ── call controls ──────────────────────────────────────────
function toggleMute() {
  isMuted = !isMuted;
  if (localStream) localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted);
  document.getElementById('ctrl-mute').classList.toggle('active',isMuted);
  toast(isMuted?'Muted':'Unmuted');
}
function toggleSpeaker() {
  document.getElementById('ctrl-spk').classList.toggle('active');
  toast('Speaker toggled');
}
function toggleKeypad() {
  document.getElementById('ctrl-kp').classList.toggle('active');
}

// ── WS helper ──────────────────────────────────────────────
async function wsSend(obj) {
  if (!ws || ws.readyState !== 1) return;

  // Add OCP metadata to every message
  const message = {
    ocp:       '1.0',
    id:        crypto.randomUUID(),
    timestamp: Math.floor(Date.now() / 1000),
    from:      myIdentity ? myIdentity.ocp_address : null,
    ...obj
  };

  // Sign the message if we have an identity
  if (myIdentity) {
    message.signature = await signMessage(myIdentity, message);
  }

  const payload = JSON.stringify(message);
  ws.send(payload);
  console.log('[→]', obj.type, message);
}

// ── keyboard ───────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const active = document.querySelector('.screen:not(.hidden)');
  if (!active || active.id !== 'scr-dialer') return;
  if ('0123456789*#'.includes(e.key)) pressKey(e.key);
  if (e.key==='Backspace') doDelete();
  if (e.key==='Enter') doCall();
});

// ── service worker ─────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ── crypto test — call testCrypto() from browser console ───
async function testCrypto() {
  console.log('[OCP Test] Starting crypto test...');

  // Test 1: Identity generation
  const identity = await generateIdentity();
  console.log('[OCP Test] Identity generated ✓');
  console.log('[OCP Test] OCP address:', identity.ocp_address);

  // Test 2: Sign a message
  const testMessage = { type: 'test', data: 'hello ocp' };
  const signature = await signMessage(identity, testMessage);
  console.log('[OCP Test] Message signed ✓');
  console.log('[OCP Test] Signature length:', signature.length);

  // Test 3: Verify signature
  const publicKey = await crypto.subtle.importKey(
    'jwk', identity.publicKeyJwk,
    { name: 'Ed25519' }, false, ['verify']
  );
  const sigBytes = Uint8Array.from(atob(signature), c => c.charCodeAt(0));
  const msgBytes = new TextEncoder().encode(JSON.stringify(testMessage));
  const valid = await crypto.subtle.verify('Ed25519', publicKey, sigBytes, msgBytes);
  console.log('[OCP Test] Signature valid:', valid, valid ? '✓' : '✗');

  // Test 4: Encrypt
  const encrypted = await encryptMessage(identity, identity.publicKeyRaw, {secret:'test'});
  console.log('[OCP Test] Encrypted ✓ body length:', encrypted.body.length);

  // Test 5: Double Ratchet
  await initRatchetSession('test-peer');
  const ratchetMsg = { text: 'hello from ratchet' };
  const enc = await ratchetEncrypt('test-peer', ratchetMsg);
  console.log('[OCP Test] Ratchet encrypted ✓ count:', enc.count);
  clearRatchetSession('test-peer');
  console.log('[OCP Test] Ratchet session cleared ✓');

  console.log('[OCP Test] All tests passed ✓');
  return { identity, signature, encrypted };
}
